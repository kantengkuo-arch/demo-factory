<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏭 Demo Factory</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0e1a; color: #e2e8f0;
            min-height: 100vh;
        }

        /* === 导航 === */
        nav {
            background: #111827;
            border-bottom: 1px solid #1f2937;
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 60px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .logo {
            font-size: 1.25rem;
            font-weight: 700;
            margin-right: 2rem;
        }
        nav .tabs {
            display: flex;
            gap: 0.25rem;
        }
        nav .tab {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        nav .tab:hover { color: #e2e8f0; background: #1f2937; }
        nav .tab.active { color: #3b82f6; background: #1e3a5f; }

        /* === 主体 === */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        /* === 统计卡片 === */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .stat-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 1.25rem;
        }
        .stat-card .label { color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.25rem; }
        .stat-card .value { font-size: 2rem; font-weight: 700; }
        .stat-card .value.blue { color: #3b82f6; }
        .stat-card .value.green { color: #10b981; }
        .stat-card .value.purple { color: #8b5cf6; }

        /* === Demo 网格 === */
        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 1.25rem;
        }
        .demo-card {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 1.5rem;
            transition: border-color 0.2s;
        }
        .demo-card:hover { border-color: #3b82f6; }
        .demo-card .title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .demo-card .desc {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }
        .demo-card .meta {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
        }
        .tag {
            background: #1e3a5f;
            color: #93c5fd;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
        }
        .score-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .score-high { background: #064e3b; color: #6ee7b7; }
        .score-mid { background: #713f12; color: #fcd34d; }
        .score-low { background: #7f1d1d; color: #fca5a5; }
        .demo-card .actions { display: flex; gap: 0.5rem; }
        .btn {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn-start { background: #10b981; color: white; }
        .btn-start:hover { background: #059669; }
        .btn-stop { background: #ef4444; color: white; }
        .btn-stop:hover { background: #dc2626; }
        .btn-open { background: #3b82f6; color: white; }
        .btn-open:hover { background: #2563eb; }
        .btn-disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
        .btn.loading { opacity: 0.6; pointer-events: none; }

        .status-dot {
            display: inline-block;
            width: 8px; height: 8px;
            border-radius: 50%;
            margin-right: 4px;
        }
        .status-dot.on { background: #10b981; box-shadow: 0 0 6px #10b981; }
        .status-dot.off { background: #6b7280; }

        /* === 图表区 === */
        .chart-section {
            background: #111827;
            border: 1px solid #1f2937;
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
        }
        .chart-section h3 { margin-bottom: 1rem; font-size: 1rem; }

        /* === 页面切换 === */
        .page { display: none; }
        .page.active { display: block; }

        /* === 空状态 === */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #6b7280;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <nav>
        <div class="logo">🏭 Demo Factory</div>
        <div class="tabs">
            <div class="tab active" onclick="switchPage('demos')">Demo 列表</div>
            <div class="tab" onclick="switchPage('timeline')">协作时间线</div>
            <div class="tab" onclick="switchPage('arena')">竞技场</div>
        </div>
    </nav>

    <div class="container">
        <!-- ========== Demo 列表页 ========== -->
        <div id="page-demos" class="page active">
            <div class="stats-row" id="stats-row"></div>
            <div class="demo-grid" id="demo-grid"></div>
            <div class="chart-section" id="score-trend-section" style="display:none">
                <h3>📈 工厂自进化曲线（评分趋势）</h3>
                <canvas id="scoreTrendChart" height="80"></canvas>
            </div>
        </div>

        <!-- ========== 时间线页（第三层填充） ========== -->
        <div id="page-timeline" class="page">
            <h2 style="margin-bottom:1rem">⏱️ Agent 协作时间线</h2>
            <p style="color:#94a3b8;margin-bottom:1.5rem">
                每个 demo 从选题到完成的 agent 协作过程。数据来自 GitHub Issue 的 label 变更事件。
            </p>
            <div id="timeline-container"></div>
        </div>

        <!-- ========== 竞技场页（第四层填充） ========== -->
        <div id="page-arena" class="page">
            <h2 style="margin-bottom:1rem">🏟️ Demo 竞技场</h2>
            <p style="color:#94a3b8;margin-bottom:1.5rem">
                同方向的 demo 互相对比，优胜劣汰。
            </p>
            <div id="arena-container"></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:7000';

        // === 页面切换 ===
        function switchPage(name) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('page-' + name).classList.add('active');
            event.target.classList.add('active');
            if (name === 'timeline') loadTimeline();
            if (name === 'arena') loadArena();
        }

        // === Demo 列表 ===
        async function loadDemos() {
            try {
                const [demosRes, statsRes] = await Promise.all([
                    fetch(API + '/api/demos').then(r => r.json()),
                    fetch(API + '/api/stats').then(r => r.json()),
                ]);

                // 统计卡片
                document.getElementById('stats-row').innerHTML = `
                    <div class="stat-card">
                        <div class="label">总 Demo 数</div>
                        <div class="value blue">${statsRes.total_demos}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">平均评分</div>
                        <div class="value green">${statsRes.avg_score || '-'}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">运行中</div>
                        <div class="value purple">${statsRes.running_count}</div>
                    </div>
                    <div class="stat-card">
                        <div class="label">热门技术</div>
                        <div class="value" style="font-size:1rem;color:#94a3b8">
                            ${statsRes.top_tech.slice(0,3).map(t => t[0]).join(', ') || '-'}
                        </div>
                    </div>
                `;

                // Demo 网格
                const grid = document.getElementById('demo-grid');
                if (demosRes.demos.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state" style="grid-column:1/-1">
                            <div class="icon">🏗️</div>
                            <p>工厂还没有产出 Demo</p>
                            <p style="margin-top:0.5rem;font-size:0.9rem">
                                在 GitHub 上创建一个 needs-scout 的 issue，或者对 boss 说"帮我做一个 Demo"
                            </p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = demosRes.demos.map(d => {
                    const scoreClass = d.score >= 80 ? 'score-high' : d.score >= 60 ? 'score-mid' : 'score-low';
                    const scoreText = d.score != null ? `${d.score}分` : '未评分';
                    const running = d.running;
                    const tech = (d.tech_stack || []).slice(0, 3);

                    return `
                        <div class="demo-card">
                            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
                                <div class="title">${d.name || d.slug}</div>
                                <span class="score-badge ${d.score != null ? scoreClass : ''}">${scoreText}</span>
                            </div>
                            <div class="desc">${d.description || ''}</div>
                            <div class="meta">
                                ${d.direction ? `<span class="tag">${d.direction}</span>` : ''}
                                ${tech.map(t => `<span class="tag">${t}</span>`).join('')}
                            </div>
                            <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;font-size:0.85rem">
                                <span class="status-dot ${running ? 'on' : 'off'}"></span>
                                ${running ? `运行中 · 端口 ${d.port}` : '未运行'}
                            </div>
                            <div class="actions">
                                ${running
                                    ? `<button class="btn btn-open" onclick="window.open('${d.url}','_blank')">打开体验</button>
                                       <button class="btn btn-stop" onclick="stopDemo('${d.slug}')">停止</button>`
                                    : `<button class="btn btn-start" onclick="startDemo('${d.slug}')">启动</button>`
                                }
                            </div>
                        </div>
                    `;
                }).join('');

                // 评分趋势图
                if (statsRes.score_trend.length >= 2) {
                    document.getElementById('score-trend-section').style.display = 'block';
                    renderScoreTrend(statsRes.score_trend);
                }

            } catch (e) {
                document.getElementById('demo-grid').innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1">
                        <div class="icon">⚠️</div>
                        <p>无法连接 Portfolio 后端 (localhost:7000)</p>
                        <p style="margin-top:0.5rem;font-size:0.9rem">请确认 platform/backend 已启动</p>
                    </div>
                `;
            }
        }

        async function startDemo(slug) {
            const btn = event.target;
            btn.classList.add('loading');
            btn.textContent = '启动中...';
            try {
                const res = await fetch(`${API}/api/demos/${slug}/start`, { method: 'POST' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail);
                // 等几秒让服务起来
                await new Promise(r => setTimeout(r, 3000));
                loadDemos();
            } catch (e) {
                alert('启动失败: ' + e.message);
                loadDemos();
            }
        }

        async function stopDemo(slug) {
            try {
                await fetch(`${API}/api/demos/${slug}/stop`, { method: 'POST' });
                loadDemos();
            } catch (e) {
                alert('停止失败: ' + e.message);
            }
        }

        // === 评分趋势图 ===
        let trendChart = null;
        function renderScoreTrend(data) {
            const ctx = document.getElementById('scoreTrendChart').getContext('2d');
            if (trendChart) trendChart.destroy();
            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map(d => d.name),
                    datasets: [{
                        label: '评分',
                        data: data.map(d => d.score),
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59,130,246,0.1)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: 5,
                        pointBackgroundColor: '#3b82f6',
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: { min: 0, max: 100, grid: { color: '#1f2937' }, ticks: { color: '#94a3b8' } },
                        x: { grid: { color: '#1f2937' }, ticks: { color: '#94a3b8', maxRotation: 45 } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // === 时间线（第三层） ===
        async function loadTimeline() {
            const container = document.getElementById('timeline-container');
            try {
                const res = await fetch(API + '/api/timeline');
                const data = await res.json();
                if (!data.issues || data.issues.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">📊</div><p>还没有时间线数据</p></div>';
                    return;
                }
                container.innerHTML = data.issues.map(issue => renderTimelineBar(issue)).join('');
            } catch (e) {
                container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>时间线 API 未启用</p></div>`;
            }
        }

        function renderTimelineBar(issue) {
            if (!issue.phases || issue.phases.length === 0) return '';
            const colors = {
                'needs-scout': '#0075CA',
                'needs-coding': '#7B61FF',
                'needs-review': '#FF9933',
                'needs-merge': '#28A745',
                'needs-eval': '#D93F0B',
                'done': '#666666',
            };
            const totalMs = issue.phases.reduce((s, p) => s + p.duration_min, 0);
            const bars = issue.phases.map(p => {
                const pct = totalMs > 0 ? (p.duration_min / totalMs * 100) : 0;
                const bg = colors[p.label] || '#4b5563';
                return `<div title="${p.label}: ${p.duration_min}分钟" style="width:${pct}%;background:${bg};height:28px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;color:white;min-width:30px;overflow:hidden">${p.label.replace('needs-','')}</div>`;
            }).join('');
            const total = Math.round(totalMs);
            return `
                <div style="margin-bottom:1rem">
                    <div style="display:flex;justify-content:space-between;margin-bottom:0.25rem">
                        <span style="font-weight:600;font-size:0.9rem">${issue.title}</span>
                        <span style="color:#94a3b8;font-size:0.8rem">总计 ${total} 分钟</span>
                    </div>
                    <div style="display:flex;gap:2px;border-radius:6px;overflow:hidden">${bars}</div>
                </div>
            `;
        }

        // === 竞技场（第四层） ===
        async function loadArena() {
            const container = document.getElementById('arena-container');
            try {
                const res = await fetch(API + '/api/arena');
                const data = await res.json();
                if (!data.matchups || data.matchups.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">🏟️</div><p>还没有同方向的 demo 可以对比</p><p style="margin-top:0.5rem;font-size:0.9rem;color:#6b7280">同一个方向至少有 2 个 demo 才能开竞技场</p></div>';
                    return;
                }
                container.innerHTML = data.matchups.map(m => `
                    <div style="background:#111827;border:1px solid #1f2937;border-radius:12px;padding:1.5rem;margin-bottom:1rem">
                        <div style="color:#94a3b8;font-size:0.85rem;margin-bottom:0.75rem">方向：${m.direction}</div>
                        <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:1rem;align-items:center">
                            <div style="text-align:center">
                                <div style="font-weight:600;margin-bottom:0.25rem">${m.demos[0].name}</div>
                                <div style="font-size:2rem;font-weight:700;color:${m.demos[0].score >= m.demos[1].score ? '#10b981' : '#94a3b8'}">${m.demos[0].score}</div>
                            </div>
                            <div style="color:#6b7280;font-size:1.5rem">VS</div>
                            <div style="text-align:center">
                                <div style="font-weight:600;margin-bottom:0.25rem">${m.demos[1].name}</div>
                                <div style="font-size:2rem;font-weight:700;color:${m.demos[1].score >= m.demos[0].score ? '#10b981' : '#94a3b8'}">${m.demos[1].score}</div>
                            </div>
                        </div>
                        ${m.verdict ? `<div style="text-align:center;margin-top:0.75rem;color:#94a3b8;font-size:0.85rem">${m.verdict}</div>` : ''}
                    </div>
                `).join('');
            } catch (e) {
                container.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>竞技场 API 未启用</p></div>`;
            }
        }

        // 初始加载
        loadDemos();
    </script>
</body>
</html>
