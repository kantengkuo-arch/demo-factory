<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📄 AI 文档智能问答（RAG）</title>
<style>
/* ─── Reset & Base ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #242836;
  --border: #2e3345; --text: #e4e6f0; --text-dim: #8b8fa3;
  --accent: #6c5ce7; --accent-light: #a29bfe; --accent-glow: rgba(108,92,231,.25);
  --green: #00cec9; --red: #ff7675; --orange: #fdcb6e;
  --radius: 12px; --transition: .25s cubic-bezier(.4,0,.2,1);
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

/* ─── Sidebar ─── */
.sidebar {
  width: 280px; min-width: 280px; background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; transition: transform var(--transition);
}
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }
.sidebar-header h2 { font-size: 14px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
.doc-list { flex: 1; overflow-y: auto; padding: 12px; }
.doc-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; margin-bottom: 8px; background: var(--surface2);
  border-radius: var(--radius); cursor: default; transition: background var(--transition);
  animation: slideIn .3s ease;
}
.doc-item:hover { background: var(--border); }
.doc-item .info { flex: 1; min-width: 0; }
.doc-item .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.doc-item .meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.doc-item .delete-btn {
  background: none; border: none; color: var(--text-dim); cursor: pointer; padding: 4px 8px;
  border-radius: 6px; font-size: 16px; transition: all var(--transition); flex-shrink: 0;
}
.doc-item .delete-btn:hover { color: var(--red); background: rgba(255,118,117,.1); }
.doc-empty { text-align: center; color: var(--text-dim); padding: 40px 20px; font-size: 13px; }

/* ─── Main ─── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ─── Header ─── */
.header {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px; background: var(--surface);
}
.menu-toggle { display: none; background: none; border: none; color: var(--text); font-size: 22px; cursor: pointer; }
.header h1 { font-size: 18px; font-weight: 700; }
.header h1 span { color: var(--accent-light); }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); margin-left: auto; transition: background .5s; }
.status-dot.online { background: var(--green); }

/* ─── Chat Area ─── */
.chat-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Welcome / Upload Zone */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 24px; animation: fadeIn .5s ease; }
.upload-zone {
  width: 100%; max-width: 500px; border: 2px dashed var(--border); border-radius: 16px;
  padding: 48px 24px; text-align: center; cursor: pointer; transition: all var(--transition);
  position: relative; overflow: hidden;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: var(--accent); background: var(--accent-glow);
}
.upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
.upload-zone .title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
.upload-zone .subtitle { font-size: 13px; color: var(--text-dim); }
.upload-zone input { display: none; }
.upload-progress {
  position: absolute; bottom: 0; left: 0; height: 3px; background: var(--accent);
  border-radius: 2px; transition: width .3s; width: 0;
}
.upload-status {
  margin-top: 8px; font-size: 13px; color: var(--green); min-height: 20px;
  animation: fadeIn .3s ease;
}

/* Quick Questions */
.quick-questions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 500px; animation: fadeIn .5s ease .2s both; }
.quick-btn {
  padding: 8px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-size: 13px; cursor: pointer; transition: all var(--transition);
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent-light); background: var(--accent-glow); }

/* Messages */
.message { display: flex; gap: 12px; max-width: 80%; animation: slideUp .3s ease; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.message .avatar {
  width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center;
  justify-content: center; font-size: 16px; flex-shrink: 0;
}
.message.ai .avatar { background: var(--accent-glow); }
.message.user .avatar { background: rgba(0,206,201,.15); }
.message .bubble {
  padding: 14px 18px; border-radius: 16px; font-size: 14px; line-height: 1.7;
  word-break: break-word;
}
.message.ai .bubble { background: var(--surface2); border-bottom-left-radius: 4px; }
.message.user .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }

/* Sources */
.sources-toggle {
  background: none; border: none; color: var(--accent-light); font-size: 12px;
  cursor: pointer; margin-top: 8px; padding: 4px 0;
}
.sources-toggle:hover { text-decoration: underline; }
.sources-list { margin-top: 8px; display: none; }
.sources-list.show { display: block; animation: fadeIn .3s ease; }
.source-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; margin-bottom: 6px; font-size: 12px;
}
.source-card .source-header { display: flex; justify-content: space-between; color: var(--text-dim); margin-bottom: 4px; }
.source-card .source-content { color: var(--text); line-height: 1.5; }

/* Typing Indicator */
.typing { display: flex; gap: 4px; padding: 8px 0; }
.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); animation: bounce .6s infinite alternate; }
.typing span:nth-child(2) { animation-delay: .15s; }
.typing span:nth-child(3) { animation-delay: .3s; }

/* ─── Input Bar ─── */
.input-bar {
  padding: 16px 24px; border-top: 1px solid var(--border); background: var(--surface);
  display: flex; gap: 12px; align-items: flex-end;
}
.input-bar textarea {
  flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 16px; color: var(--text); font-size: 14px; resize: none; outline: none;
  min-height: 44px; max-height: 120px; line-height: 1.5; font-family: inherit;
  transition: border-color var(--transition);
}
.input-bar textarea:focus { border-color: var(--accent); }
.input-bar textarea::placeholder { color: var(--text-dim); }
.send-btn {
  width: 44px; height: 44px; border-radius: var(--radius); border: none;
  background: var(--accent); color: #fff; font-size: 18px; cursor: pointer;
  transition: all var(--transition); display: flex; align-items: center; justify-content: center;
}
.send-btn:hover { background: var(--accent-light); transform: scale(1.05); }
.send-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

/* ─── Animations ─── */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideIn { from { opacity: 0; transform: translateX(-12px); } to { opacity: 1; transform: none; } }
@keyframes slideUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
@keyframes bounce { to { transform: translateY(-6px); opacity: .4; } }

/* ─── Responsive ─── */
@media (max-width: 768px) {
  .sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 100; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: 4px 0 24px rgba(0,0,0,.5); }
  .menu-toggle { display: block; }
  .message { max-width: 92%; }
  .upload-zone { max-width: 100%; padding: 32px 16px; }
}

/* ─── Overlay for mobile sidebar ─── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 99; }
.overlay.show { display: block; }
</style>
</head>
<body>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header"><h2>📁 已上传文档</h2></div>
  <div class="doc-list" id="docList">
    <div class="doc-empty" id="docEmpty">还没有上传文档<br>上传文件后这里会显示列表</div>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <!-- Header -->
  <div class="header">
    <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
    <h1>📄 AI 文档<span>智能问答</span></h1>
    <div class="status-dot" id="statusDot" title="后端状态"></div>
  </div>

  <!-- Chat -->
  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <div class="upload-zone" id="uploadZone">
        <div class="icon">📤</div>
        <div class="title">拖拽文件到这里，或点击上传</div>
        <div class="subtitle">支持 PDF、TXT、DOCX 格式</div>
        <input type="file" id="fileInput" accept=".pdf,.txt,.docx">
        <div class="upload-progress" id="uploadProgress"></div>
      </div>
      <div class="upload-status" id="uploadStatus"></div>
      <div class="quick-questions" id="quickQuestions" style="display:none">
        <button class="quick-btn" onclick="askQuestion('这个文档的主要内容是什么？')">📝 主要内容</button>
        <button class="quick-btn" onclick="askQuestion('帮我总结一下核心观点')">💡 核心观点</button>
        <button class="quick-btn" onclick="askQuestion('有哪些关键数据或结论？')">📊 关键数据</button>
        <button class="quick-btn" onclick="askQuestion('这个文档适合什么场景？')">🎯 适用场景</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-bar">
    <textarea id="inputBox" placeholder="输入你的问题…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>

<script>
/* ─── Config ─── */
const API = 'http://localhost:8000';
let documents = [];
let chatStarted = false;

/* ─── DOM refs ─── */
const $ = id => document.getElementById(id);
const chatArea = $('chatArea');
const welcome = $('welcome');
const uploadZone = $('uploadZone');
const fileInput = $('fileInput');
const uploadProgress = $('uploadProgress');
const uploadStatus = $('uploadStatus');
const quickQuestions = $('quickQuestions');
const docList = $('docList');
const docEmpty = $('docEmpty');
const inputBox = $('inputBox');
const sendBtn = $('sendBtn');
const statusDot = $('statusDot');
const sidebar = $('sidebar');
const overlay = $('overlay');

/* ─── Health check ─── */
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    if (r.ok) { statusDot.classList.add('online'); statusDot.title = '后端已连接'; }
    else throw 0;
  } catch { statusDot.classList.remove('online'); statusDot.title = '后端未连接'; }
}
checkHealth();
setInterval(checkHealth, 15000);

/* ─── Sidebar toggle ─── */
function toggleSidebar() {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
}

/* ─── Upload ─── */
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault(); uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => { if (fileInput.files.length) uploadFile(fileInput.files[0]); });

async function uploadFile(file) {
  const allowed = ['application/pdf', 'text/plain',
    'application/vnd.openxmlformats-officedocument.wordprocessingml.document'];
  const ext = file.name.split('.').pop().toLowerCase();
  if (!allowed.includes(file.type) && !['pdf','txt','docx'].includes(ext)) {
    uploadStatus.style.color = 'var(--red)';
    uploadStatus.textContent = '❌ 不支持的文件格式，请上传 PDF/TXT/DOCX';
    return;
  }

  uploadStatus.style.color = 'var(--orange)';
  uploadStatus.textContent = '⏳ 正在上传并处理文档…';
  uploadProgress.style.width = '30%';

  const fd = new FormData();
  fd.append('file', file);

  try {
    uploadProgress.style.width = '60%';
    const r = await fetch(`${API}/api/upload`, { method: 'POST', body: fd });
    uploadProgress.style.width = '90%';
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    uploadProgress.style.width = '100%';
    setTimeout(() => { uploadProgress.style.width = '0'; }, 800);

    uploadStatus.style.color = 'var(--green)';
    uploadStatus.textContent = `✅ "${data.filename}" 已处理（${data.pages || '?'} 页）`;
    quickQuestions.style.display = 'flex';
    loadDocuments();
  } catch (err) {
    uploadProgress.style.width = '0';
    uploadStatus.style.color = 'var(--red)';
    uploadStatus.textContent = `❌ 上传失败：${err.message}`;
  }
  fileInput.value = '';
}

/* ─── Documents ─── */
async function loadDocuments() {
  try {
    const r = await fetch(`${API}/api/documents`);
    const data = await r.json();
    documents = data.documents || [];
    renderDocs();
  } catch {}
}
loadDocuments();

function renderDocs() {
  if (!documents.length) { docEmpty.style.display = 'block'; docList.querySelectorAll('.doc-item').forEach(e => e.remove()); return; }
  docEmpty.style.display = 'none';
  docList.querySelectorAll('.doc-item').forEach(e => e.remove());
  documents.forEach(doc => {
    const el = document.createElement('div');
    el.className = 'doc-item';
    const time = doc.upload_time ? new Date(doc.upload_time).toLocaleString('zh-CN') : '';
    el.innerHTML = `
      <div class="info"><div class="name" title="${doc.filename}">${doc.filename}</div><div class="meta">${time}</div></div>
      <button class="delete-btn" title="删除" onclick="deleteDoc('${doc.id}')">🗑</button>`;
    docList.appendChild(el);
  });
}

async function deleteDoc(id) {
  if (!confirm('确定删除这个文档？')) return;
  try {
    await fetch(`${API}/api/documents/${id}`, { method: 'DELETE' });
    loadDocuments();
  } catch {}
}

/* ─── Chat ─── */
function startChat() {
  if (chatStarted) return;
  chatStarted = true;
  welcome.style.display = 'none';
}

function addMessage(role, html) {
  startChat();
  const div = document.createElement('div');
  div.className = `message ${role}`;
  const emoji = role === 'ai' ? '🤖' : '👤';
  div.innerHTML = `<div class="avatar">${emoji}</div><div class="bubble">${html}</div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
  return div;
}

function addTyping() {
  const div = addMessage('ai', '<div class="typing"><span></span><span></span><span></span></div>');
  div.id = 'typing-indicator';
  return div;
}
function removeTyping() {
  const t = $('typing-indicator');
  if (t) t.remove();
}

function renderSources(sources) {
  if (!sources || !sources.length) return '';
  const id = 'src-' + Date.now();
  let cards = sources.map((s, i) => `
    <div class="source-card">
      <div class="source-header"><span>📄 第 ${s.page ?? '?'} 页</span><span>相似度 ${(s.score * 100).toFixed(1)}%</span></div>
      <div class="source-content">${escapeHtml(s.content)}</div>
    </div>`).join('');
  return `<button class="sources-toggle" onclick="this.nextElementSibling.classList.toggle('show')">📎 查看 ${sources.length} 条引用来源</button>
    <div class="sources-list" id="${id}">${cards}</div>`;
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ─── Send ─── */
async function askQuestion(q) {
  inputBox.value = q;
  await sendMessage();
}

async function sendMessage() {
  const q = inputBox.value.trim();
  if (!q) return;
  inputBox.value = '';
  autoResize(inputBox);
  sendBtn.disabled = true;

  addMessage('user', escapeHtml(q));
  addTyping();

  try {
    const r = await fetch(`${API}/api/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q })
    });
    removeTyping();
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const answerHtml = escapeHtml(data.answer).replace(/\n/g, '<br>') + renderSources(data.sources);
    addMessage('ai', answerHtml);
  } catch (err) {
    removeTyping();
    addMessage('ai', `<span style="color:var(--red)">❌ 请求失败：${escapeHtml(err.message)}</span>`);
  }
  sendBtn.disabled = false;
  inputBox.focus();
}

/* ─── Input helpers ─── */
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
inputBox.addEventListener('input', () => { sendBtn.disabled = !inputBox.value.trim(); });
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}
</script>
</body>
</html>
