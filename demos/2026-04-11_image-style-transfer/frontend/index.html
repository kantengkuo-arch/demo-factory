<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StyleForge - AI 图片风格转换</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--card:#1e293b;--border:#334155;
  --primary:#8b5cf6;--primary-hover:#a78bfa;--primary-dim:rgba(139,92,246,.15);
  --text:#e2e8f0;--text-sec:#94a3b8;--text-dim:#64748b;
  --success:#10b981;--error:#ef4444;--warning:#f59e0b;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
a{color:var(--primary);text-decoration:none}

.header{padding:24px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;background:rgba(15,23,42,.85)}
.header-left{display:flex;align-items:center;gap:14px}
.logo{font-size:28px;font-weight:800;background:linear-gradient(135deg,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{color:var(--text-sec);font-size:13px;margin-top:2px}
.status-badge{display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--card)}
.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.online{background:var(--success);box-shadow:0 0 8px var(--success)}
.status-dot.offline{background:var(--error);box-shadow:0 0 8px var(--error)}

.main{max-width:1400px;margin:0 auto;padding:32px}
.workflow{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px}

.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;transition:border-color .2s}
.card:hover{border-color:rgba(139,92,246,.3)}
.card-title{font-size:16px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.card-title .step{background:var(--primary);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}

.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;min-height:200px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--primary);background:var(--primary-dim)}
.upload-zone.has-image{border-style:solid;padding:8px}
.upload-zone .icon{font-size:48px;margin-bottom:12px;opacity:.6}
.upload-zone .label{font-size:14px;color:var(--text-sec);line-height:1.6}
.upload-zone .label strong{color:var(--primary)}
.upload-zone input[type="file"]{display:none}
.upload-zone img{max-width:100%;max-height:280px;border-radius:8px;object-fit:contain}
.upload-zone .remove-btn{position:absolute;top:12px;right:12px;background:rgba(239,68,68,.85);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.upload-zone:hover .remove-btn{opacity:1}

.style-tabs{display:flex;gap:4px;background:rgba(15,23,42,.5);border-radius:10px;padding:4px;margin-bottom:16px}
.style-tab{flex:1;padding:10px;text-align:center;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text-sec);transition:all .2s;border:none;background:none}
.style-tab.active{background:var(--primary);color:#fff}
.presets-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.preset-card{border:2px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.preset-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.preset-card.selected{border-color:var(--primary);box-shadow:0 0 16px rgba(139,92,246,.3)}
.preset-card .preview{width:100%;aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden}
.preset-card .preview img{width:100%;height:100%;object-fit:cover}
.preset-card .name{padding:8px;font-size:12px;font-weight:600;text-align:center;background:rgba(15,23,42,.6)}
.preset-card .check{position:absolute;top:6px;right:6px;background:var(--primary);color:#fff;width:22px;height:22px;border-radius:50%;display:none;align-items:center;justify-content:center;font-size:12px}
.preset-card.selected .check{display:flex}
.upload-style-zone{border:2px dashed var(--border);border-radius:10px;padding:32px 16px;text-align:center;cursor:pointer;transition:all .3s;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.upload-style-zone:hover,.upload-style-zone.drag-over{border-color:var(--primary);background:var(--primary-dim)}
.upload-style-zone.has-image{border-style:solid;padding:8px;position:relative}
.upload-style-zone img{max-width:100%;max-height:200px;border-radius:8px;object-fit:contain}
.upload-style-zone .remove-btn{position:absolute;top:8px;right:8px;background:rgba(239,68,68,.85);color:#fff;border:none;border-radius:50%;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}

.controls-section{margin-top:16px}
.control-group{margin-bottom:20px}
.control-label{font-size:13px;font-weight:600;color:var(--text-sec);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.control-label .value{color:var(--primary);font-weight:700}
.algo-select{display:flex;gap:8px}
.algo-btn{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--bg);color:var(--text-sec);cursor:pointer;text-align:center;transition:all .2s;font-size:13px;font-weight:600}
.algo-btn:hover{border-color:var(--primary)}
.algo-btn.active{border-color:var(--primary);background:var(--primary-dim);color:var(--primary)}
.algo-btn .algo-icon{font-size:24px;margin-bottom:6px}
.algo-btn .algo-desc{font-size:11px;color:var(--text-dim);margin-top:4px;font-weight:400}
input[type="range"]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--border);outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--primary);cursor:pointer;box-shadow:0 0 8px rgba(139,92,246,.4)}

.generate-btn{width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:8px;position:relative;overflow:hidden}
.generate-btn:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 8px 24px rgba(139,92,246,.4)}
.generate-btn:disabled{opacity:.5;cursor:not-allowed}
.generate-btn .spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;display:none}
.generate-btn.loading .spinner{display:block}
.generate-btn.loading .btn-text{display:none}

.result-card{min-height:400px;display:flex;flex-direction:column}
.progress-bar-wrap{background:var(--bg);border-radius:8px;height:12px;overflow:hidden;margin:12px 0}
.progress-bar{height:100%;background:linear-gradient(90deg,#8b5cf6,#ec4899);border-radius:8px;transition:width .4s ease;width:0}
.progress-info{display:flex;justify-content:space-between;font-size:13px;color:var(--text-sec);margin-bottom:8px}
.result-display{flex:1;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:12px;background:var(--bg);min-height:360px;position:relative;overflow:hidden}
.result-display .placeholder{text-align:center;color:var(--text-dim)}
.result-display .placeholder .icon{font-size:64px;margin-bottom:12px;opacity:.4}
.result-display .placeholder p{font-size:14px}
.result-display img{max-width:100%;max-height:500px;object-fit:contain;border-radius:8px;animation:fadeIn .6s ease}
.result-actions{display:flex;gap:10px;margin-top:16px}
.action-btn{flex:1;padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.action-btn:hover{border-color:var(--primary);background:var(--primary-dim)}
.action-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
.action-btn.primary:hover{background:var(--primary-hover)}

.compare-view{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.compare-item{text-align:center}
.compare-item img{width:100%;border-radius:10px;border:1px solid var(--border)}
.compare-item .compare-label{font-size:12px;color:var(--text-sec);margin-top:8px;font-weight:600}

.skeleton{background:linear-gradient(90deg,var(--border) 25%,rgba(51,65,85,.5) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

.toast-container{position:fixed;top:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:10px}
.toast{padding:14px 20px;border-radius:10px;font-size:14px;font-weight:500;animation:slideIn .3s ease;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.3);max-width:400px}
.toast.success{background:#065f46;color:#6ee7b7;border:1px solid #10b981}
.toast.error{background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444}
.toast.info{background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

.hidden{display:none!important}

@media(max-width:900px){
  .workflow{grid-template-columns:1fr}
  .presets-grid{grid-template-columns:repeat(3,1fr)}
  .header{padding:16px 20px}
  .main{padding:16px}
  .compare-view{grid-template-columns:1fr}
}
@media(max-width:480px){
  .presets-grid{grid-template-columns:repeat(2,1fr)}
  .algo-select{flex-direction:column}
}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<header class="header">
  <div class="header-left">
    <div>
      <div class="logo">🎨 StyleForge</div>
      <div class="tagline">AI 驱动的图片风格转换 · 一键生成艺术大作</div>
    </div>
  </div>
  <div class="status-badge" id="statusBadge">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">检测中...</span>
  </div>
</header>

<main class="main">
  <div class="workflow">
    <div>
      <div class="card" style="margin-bottom:28px">
        <div class="card-title"><span class="step">1</span>上传内容图片</div>
        <div class="upload-zone" id="contentUpload">
          <input type="file" id="contentInput" accept="image/*">
          <div class="icon">📤</div>
          <div class="label">拖拽图片到此处，或 <strong>点击选择</strong><br>支持 JPG / PNG / WebP，最大 10MB</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title"><span class="step">2</span>选择风格</div>
        <div class="style-tabs">
          <button class="style-tab active" data-tab="preset" onclick="switchStyleTab('preset')">🖼️ 预设风格</button>
          <button class="style-tab" data-tab="upload" onclick="switchStyleTab('upload')">📁 上传风格图</button>
        </div>
        <div id="presetPanel">
          <div class="presets-grid" id="presetsGrid"></div>
        </div>
        <div id="uploadPanel" class="hidden">
          <div class="upload-style-zone" id="styleUpload">
            <input type="file" id="styleInput" accept="image/*">
            <div class="icon" style="font-size:36px">🎭</div>
            <div class="label" style="font-size:13px">上传你喜欢的风格图片</div>
          </div>
        </div>
      </div>
    </div>

    <div>
      <div class="card" style="margin-bottom:28px">
        <div class="card-title"><span class="step">3</span>调整参数</div>
        <div class="controls-section">
          <div class="control-group">
            <div class="control-label">算法选择</div>
            <div class="algo-select">
              <button class="algo-btn active" data-algo="classic_nst" onclick="selectAlgo('classic_nst')">
                <div class="algo-icon">🧠</div>经典 NST
                <div class="algo-desc">VGG19 神经风格迁移<br>速度快，效果稳定</div>
              </button>
              <button class="algo-btn" data-algo="stable_diffusion" onclick="selectAlgo('stable_diffusion')">
                <div class="algo-icon">🌀</div>Stable Diffusion
                <div class="algo-desc">扩散模型风格转换<br>效果更强，耗时较长</div>
              </button>
            </div>
          </div>
          <div class="control-group">
            <div class="control-label">风格强度 <span class="value" id="strengthValue">0.8</span></div>
            <input type="range" id="strengthSlider" min="0.1" max="1" step="0.05" value="0.8" oninput="updateStrength(this.value)">
          </div>
        </div>
        <button class="generate-btn" id="generateBtn" onclick="startTransfer()" disabled>
          <span class="spinner"></span>
          <span class="btn-text">✨ 开始风格转换</span>
        </button>
      </div>

      <div class="card result-card">
        <div class="card-title"><span class="step">4</span>转换结果</div>
        <div id="progressSection" class="hidden">
          <div class="progress-info">
            <span id="progressLabel">正在转换...</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
        </div>
        <div class="result-display" id="resultDisplay">
          <div class="placeholder"><div class="icon">🖼️</div><p>转换结果将在这里显示</p></div>
        </div>
        <div class="result-actions hidden" id="resultActions">
          <button class="action-btn" onclick="toggleCompare()">🔄 对比查看</button>
          <button class="action-btn primary" onclick="downloadResult()">⬇️ 下载图片</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card hidden" id="compareCard">
    <div class="card-title">📊 前后对比</div>
    <div class="compare-view">
      <div class="compare-item">
        <img id="compareOriginal" src="" alt="原图">
        <div class="compare-label">原始图片</div>
      </div>
      <div class="compare-item">
        <img id="compareResult" src="" alt="结果">
        <div class="compare-label">风格转换结果</div>
      </div>
    </div>
  </div>
</main>

<script>
// ============== CONFIG ==============
const API_BASE = 'http://localhost:8000';
let MOCK_MODE = false; // Auto-detected on init

// ============== STATE ==============
const state = {
  contentFile: null,
  contentPreviewUrl: null,
  styleFile: null,
  stylePreviewUrl: null,
  styleSource: 'preset',
  presetStyle: 'vangogh',
  algorithm: 'classic_nst',
  strength: 0.8,
  contentId: null,
  styleId: null,
  resultUrl: null,
  isProcessing: false
};

// ============== MOCK DATA ==============
const MOCK_PRESETS = [
  { id: 'vangogh',     name: '梵高星夜',  emoji: '🌌' },
  { id: 'picasso',     name: '毕加索',    emoji: '🎭' },
  { id: 'chinese_ink', name: '中国水墨',  emoji: '🏔️' },
  { id: 'monet',       name: '莫奈睡莲',  emoji: '🌸' },
  { id: 'pop_art',     name: '波普艺术',  emoji: '🎯' },
  { id: 'ukiyoe',      name: '浮世绘',    emoji: '🌊' }
];

let mockProgress = 0;

function mockUpload() {
  return new Promise(r => setTimeout(() => r({
    content_id: 'mock-content-' + Date.now(),
    style_id: 'mock-style-' + Date.now(),
    status: 'success'
  }), 800));
}

function mockStyleTransfer() {
  return new Promise(r => setTimeout(() => r({
    task_id: 'mock-task-' + Date.now(),
    status: 'success'
  }), 500));
}

function mockTaskStatus() {
  mockProgress += Math.random() * 25 + 10;
  if (mockProgress >= 100) {
    mockProgress = 100;
    return Promise.resolve({
      status: 'completed', progress: 100,
      result_url: state.contentPreviewUrl || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400"><rect fill="#8b5cf6" width="400" height="400"/><text x="50%" y="50%" fill="white" text-anchor="middle" dy=".3em" font-size="24">Mock Result</text></svg>'),
      error_message: null
    });
  }
  return Promise.resolve({ status: 'processing', progress: Math.min(Math.floor(mockProgress), 99), result_url: null, error_message: null });
}

function mockPresets() {
  return Promise.resolve({ presets: MOCK_PRESETS, status: 'success' });
}

// ============== API CALLS ==============
async function apiHealthCheck() {
  if (MOCK_MODE) return { status: 'healthy' };
  const res = await fetch(API_BASE + '/health');
  return await res.json();
}

async function apiUpload(contentFile, styleFile) {
  if (MOCK_MODE) return mockUpload();
  const fd = new FormData();
  fd.append('content_image', contentFile);
  if (styleFile) fd.append('style_image', styleFile);
  const res = await fetch(API_BASE + '/api/upload', { method: 'POST', body: fd });
  if (!res.ok) throw new Error('上传失败: ' + res.status);
  return await res.json();
}

async function apiStyleTransfer(params) {
  if (MOCK_MODE) return mockStyleTransfer();
  const res = await fetch(API_BASE + '/api/style-transfer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(params)
  });
  if (!res.ok) throw new Error('转换请求失败: ' + res.status);
  return await res.json();
}

async function apiTaskStatus(taskId) {
  if (MOCK_MODE) return mockTaskStatus();
  const res = await fetch(API_BASE + '/api/task-status/' + taskId);
  if (!res.ok) throw new Error('查询进度失败: ' + res.status);
  return await res.json();
}

async function apiPresets() {
  if (MOCK_MODE) return mockPresets();
  const res = await fetch(API_BASE + '/api/presets');
  if (!res.ok) throw new Error('获取预设失败: ' + res.status);
  return await res.json();
}

// ============== UI HELPERS ==============
function showToast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  var icons = { success: '✅', error: '❌', info: 'ℹ️' };
  t.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + msg + '</span>';
  c.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transform = 'translateX(40px)'; setTimeout(function() { t.remove(); }, 300); }, 3500);
}

async function checkHealth() {
  var dot = document.getElementById('statusDot');
  var txt = document.getElementById('statusText');
  try {
    var data = await apiHealthCheck();
    if (data.status === 'healthy') {
      dot.className = 'status-dot online';
      txt.textContent = MOCK_MODE ? 'Mock 模式' : 'API 在线';
    } else {
      dot.className = 'status-dot offline';
      txt.textContent = 'API 异常';
    }
  } catch(e) {
    dot.className = 'status-dot offline';
    txt.textContent = 'API 离线';
  }
}

function updateGenerateBtn() {
  var btn = document.getElementById('generateBtn');
  var hasContent = !!state.contentFile;
  var hasStyle = state.styleSource === 'preset' ? !!state.presetStyle : !!state.styleFile;
  btn.disabled = !hasContent || !hasStyle || state.isProcessing;
}

// ============== CONTENT IMAGE UPLOAD ==============
function setupContentUpload() {
  var zone = document.getElementById('contentUpload');
  var input = document.getElementById('contentInput');
  zone.addEventListener('click', function(e) { if (!zone.classList.contains('has-image')) input.click(); });
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', function() { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleContentFile(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', function() { if (input.files[0]) handleContentFile(input.files[0]); });
}

function handleContentFile(file) {
  if (file.size > 10 * 1024 * 1024) { showToast('图片不能超过 10MB', 'error'); return; }
  if (!file.type.startsWith('image/')) { showToast('请上传图片文件', 'error'); return; }
  state.contentFile = file;
  state.contentPreviewUrl = URL.createObjectURL(file);
  var zone = document.getElementById('contentUpload');
  zone.classList.add('has-image');
  zone.innerHTML = '<input type="file" id="contentInput" accept="image/*"><img src="' + state.contentPreviewUrl + '" alt="内容图片"><button class="remove-btn" onclick="removeContent(event)">✕</button>';
  document.getElementById('contentInput').addEventListener('change', function() { if (this.files[0]) handleContentFile(this.files[0]); });
  updateGenerateBtn();
  showToast('内容图片已上传', 'success');
}

function removeContent(e) {
  e.stopPropagation();
  state.contentFile = null;
  if (state.contentPreviewUrl) URL.revokeObjectURL(state.contentPreviewUrl);
  state.contentPreviewUrl = null;
  var zone = document.getElementById('contentUpload');
  zone.classList.remove('has-image');
  zone.innerHTML = '<input type="file" id="contentInput" accept="image/*"><div class="icon">📤</div><div class="label">拖拽图片到此处，或 <strong>点击选择</strong><br>支持 JPG / PNG / WebP，最大 10MB</div>';
  setupContentUpload();
  updateGenerateBtn();
}

// ============== STYLE IMAGE UPLOAD ==============
function setupStyleUpload() {
  var zone = document.getElementById('styleUpload');
  var input = document.getElementById('styleInput');
  zone.addEventListener('click', function() { if (!zone.classList.contains('has-image')) input.click(); });
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', function() { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) handleStyleFile(e.dataTransfer.files[0]);
  });
  input.addEventListener('change', function() { if (input.files[0]) handleStyleFile(input.files[0]); });
}

function handleStyleFile(file) {
  if (!file.type.startsWith('image/')) { showToast('请上传图片文件', 'error'); return; }
  state.styleFile = file;
  state.stylePreviewUrl = URL.createObjectURL(file);
  var zone = document.getElementById('styleUpload');
  zone.classList.add('has-image');
  zone.innerHTML = '<input type="file" id="styleInput" accept="image/*"><img src="' + state.stylePreviewUrl + '" alt="风格图片"><button class="remove-btn" onclick="removeStyle(event)" style="opacity:1">✕</button>';
  document.getElementById('styleInput').addEventListener('change', function() { if (this.files[0]) handleStyleFile(this.files[0]); });
  updateGenerateBtn();
  showToast('风格图片已上传', 'success');
}

function removeStyle(e) {
  e.stopPropagation();
  state.styleFile = null;
  if (state.stylePreviewUrl) URL.revokeObjectURL(state.stylePreviewUrl);
  state.stylePreviewUrl = null;
  var zone = document.getElementById('styleUpload');
  zone.classList.remove('has-image');
  zone.innerHTML = '<input type="file" id="styleInput" accept="image/*"><div class="icon" style="font-size:36px">🎭</div><div class="label" style="font-size:13px">上传你喜欢的风格图片</div>';
  setupStyleUpload();
  updateGenerateBtn();
}

// ============== STYLE/ALGO CONTROLS ==============
function switchStyleTab(tab) {
  state.styleSource = tab;
  document.querySelectorAll('.style-tab').forEach(function(t) { t.classList.toggle('active', t.dataset.tab === tab); });
  document.getElementById('presetPanel').classList.toggle('hidden', tab !== 'preset');
  document.getElementById('uploadPanel').classList.toggle('hidden', tab !== 'upload');
  updateGenerateBtn();
}

function selectPreset(id) {
  state.presetStyle = id;
  document.querySelectorAll('.preset-card').forEach(function(c) { c.classList.toggle('selected', c.dataset.preset === id); });
  updateGenerateBtn();
}

function selectAlgo(algo) {
  state.algorithm = algo;
  document.querySelectorAll('.algo-btn').forEach(function(b) { b.classList.toggle('active', b.dataset.algo === algo); });
}

function updateStrength(val) {
  state.strength = parseFloat(val);
  document.getElementById('strengthValue').textContent = val;
}

async function renderPresets() {
  var grid = document.getElementById('presetsGrid');
  try {
    var data = await apiPresets();
    var presets = data.presets || MOCK_PRESETS;
    grid.innerHTML = presets.map(function(p) {
      return '<div class="preset-card ' + (p.id === state.presetStyle ? 'selected' : '') + '" data-preset="' + p.id + '" onclick="selectPreset(\'' + p.id + '\')">'
        + '<div class="preview">' + (p.preview_url ? '<img src="' + API_BASE + p.preview_url + '" alt="' + p.name + '">' : (p.emoji || '🎨')) + '</div>'
        + '<div class="name">' + p.name + '</div>'
        + '<div class="check">✓</div></div>';
    }).join('');
  } catch(e) {
    grid.innerHTML = MOCK_PRESETS.map(function(p) {
      return '<div class="preset-card ' + (p.id === state.presetStyle ? 'selected' : '') + '" data-preset="' + p.id + '" onclick="selectPreset(\'' + p.id + '\')">'
        + '<div class="preview">' + (p.emoji || '🎨') + '</div>'
        + '<div class="name">' + p.name + '</div>'
        + '<div class="check">✓</div></div>';
    }).join('');
  }
}

// ============== MAIN TRANSFER FLOW ==============
async function startTransfer() {
  if (!state.contentFile || state.isProcessing) return;
  state.isProcessing = true;
  mockProgress = 0;

  var btn = document.getElementById('generateBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  document.getElementById('resultActions').classList.add('hidden');
  document.getElementById('compareCard').classList.add('hidden');

  try {
    // Step 1: Upload
    showToast('正在上传图片...', 'info');
    var styleFile = state.styleSource === 'upload' ? state.styleFile : null;
    var uploadRes = await apiUpload(state.contentFile, styleFile);
    state.contentId = uploadRes.content_id;
    state.styleId = uploadRes.style_id;

    // Step 2: Start transfer
    showToast('开始风格转换...', 'info');
    var transferParams = {
      content_id: state.contentId,
      style_source: state.styleSource,
      algorithm: state.algorithm,
      strength: state.strength
    };
    if (state.styleSource === 'upload') {
      transferParams.style_id = state.styleId;
    } else {
      transferParams.preset_style = state.presetStyle;
    }
    var transferRes = await apiStyleTransfer(transferParams);

    // Step 3: Poll progress
    document.getElementById('progressSection').classList.remove('hidden');
    document.getElementById('resultDisplay').innerHTML = '<div class="skeleton" style="width:90%;height:300px;margin:auto"></div>';
    await pollTaskStatus(transferRes.task_id);

  } catch(err) {
    showToast('转换失败: ' + err.message, 'error');
    document.getElementById('progressSection').classList.add('hidden');
    document.getElementById('resultDisplay').innerHTML = '<div class="placeholder"><div class="icon">❌</div><p>转换失败，请重试</p></div>';
  } finally {
    state.isProcessing = false;
    btn.classList.remove('loading');
    updateGenerateBtn();
  }
}

async function pollTaskStatus(taskId) {
  var bar = document.getElementById('progressBar');
  var label = document.getElementById('progressLabel');
  var percent = document.getElementById('progressPercent');

  while (true) {
    var status = await apiTaskStatus(taskId);

    if (status.status === 'completed') {
      bar.style.width = '100%';
      percent.textContent = '100%';
      label.textContent = '转换完成！';
      state.resultUrl = API_BASE + status.result_url;

      document.getElementById('resultDisplay').innerHTML = '<img src="' + API_BASE + status.result_url + '" alt="风格转换结果">';
      document.getElementById('resultActions').classList.remove('hidden');
      document.getElementById('progressSection').classList.add('hidden');

      if (state.contentPreviewUrl) {
        document.getElementById('compareOriginal').src = state.contentPreviewUrl;
        document.getElementById('compareResult').src = API_BASE + status.result_url;
      }
      showToast('🎉 风格转换完成！', 'success');
      return;
    }

    if (status.status === 'failed') {
      throw new Error(status.error_message || '转换失败');
    }

    bar.style.width = status.progress + '%';
    percent.textContent = status.progress + '%';
    label.textContent = status.progress < 30 ? '正在分析图片...' : status.progress < 70 ? '正在应用风格...' : '正在生成结果...';

    await new Promise(function(r) { setTimeout(r, 1000); });
  }
}

function toggleCompare() {
  var card = document.getElementById('compareCard');
  card.classList.toggle('hidden');
  if (!card.classList.contains('hidden')) {
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function downloadResult() {
  if (!state.resultUrl) return;
  var a = document.createElement('a');
  a.href = state.resultUrl;
  a.download = 'styleforge_' + Date.now() + '.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  showToast('图片下载中...', 'success');
}

// ============== INIT ==============
document.addEventListener('DOMContentLoaded', async function() {
  // Auto-detect: try real API first, fallback to mock
  try {
    var res = await fetch(API_BASE + '/health', { signal: AbortSignal.timeout(2000) });
    var data = await res.json();
    MOCK_MODE = !(data && data.status === 'healthy');
  } catch(e) {
    MOCK_MODE = true;
  }

  checkHealth();
  setInterval(checkHealth, 30000);
  setupContentUpload();
  setupStyleUpload();
  renderPresets();
  updateGenerateBtn();
});
</script>
