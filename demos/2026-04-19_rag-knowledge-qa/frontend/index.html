<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 智能知识库 — 上传文档即刻对话</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/marked/marked.min.js">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f172a;--card:#1e293b;--border:#334155;
  --primary:#3b82f6;--primary-hover:#60a5fa;--primary-dim:rgba(59,130,246,.12);
  --text:#e2e8f0;--text-sec:#94a3b8;--text-dim:#64748b;
  --success:#10b981;--error:#ef4444;--warning:#f59e0b;
  --sidebar-w:320px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ─── Header ─── */
.header{height:56px;padding:0 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:rgba(15,23,42,.92);backdrop-filter:blur(12px);flex-shrink:0;z-index:50}
.header-left{display:flex;align-items:center;gap:12px}
.sidebar-toggle{background:none;border:1px solid var(--border);color:var(--text-sec);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.sidebar-toggle:hover{border-color:var(--primary);color:var(--primary)}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.tagline{color:var(--text-dim);font-size:12px;margin-left:8px}
.status-badge{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:16px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--card)}
.status-dot{width:7px;height:7px;border-radius:50%}
.status-dot.online{background:var(--success);box-shadow:0 0 6px var(--success)}
.status-dot.offline{background:var(--error);box-shadow:0 0 6px var(--error)}

/* ─── Layout ─── */
.app-body{flex:1;display:flex;overflow:hidden;position:relative}

/* ─── Sidebar ─── */
.sidebar{width:var(--sidebar-w);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:margin-left .3s ease}
.sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w))}
.sidebar-section{padding:16px}
.sidebar-section-title{font-size:13px;font-weight:700;color:var(--text-sec);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}

/* Upload Zone */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:24px 12px;text-align:center;cursor:pointer;transition:all .3s;position:relative}
.upload-zone:hover,.upload-zone.drag-over{border-color:var(--primary);background:var(--primary-dim)}
.upload-zone input{display:none}
.upload-zone .uz-icon{font-size:32px;margin-bottom:8px;opacity:.6}
.upload-zone .uz-text{font-size:13px;color:var(--text-sec);line-height:1.5}
.upload-zone .uz-text strong{color:var(--primary)}
.upload-zone .uz-hint{font-size:11px;color:var(--text-dim);margin-top:6px}
.upload-progress{margin-top:10px;display:none}
.upload-progress .up-bar-wrap{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.upload-progress .up-bar{height:100%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:3px;transition:width .3s;width:0}
.upload-progress .up-label{font-size:11px;color:var(--text-sec);margin-top:4px;text-align:center}

/* Doc List */
.doc-list{flex:1;overflow-y:auto;padding:0 16px 16px}
.doc-list::-webkit-scrollbar{width:4px}
.doc-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.doc-item{padding:12px;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative}
.doc-item:hover{border-color:var(--primary);background:rgba(59,130,246,.06)}
.doc-item.selected{border-color:var(--primary);background:var(--primary-dim)}
.doc-item .doc-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:28px}
.doc-item .doc-meta{font-size:11px;color:var(--text-dim);margin-top:4px;display:flex;gap:10px}
.doc-item .doc-delete{position:absolute;top:10px;right:10px;background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:4px;transition:all .15s;opacity:0}
.doc-item:hover .doc-delete{opacity:1}
.doc-item .doc-delete:hover{color:var(--error);background:rgba(239,68,68,.1)}
.doc-empty{text-align:center;padding:24px 12px;color:var(--text-dim);font-size:13px}

/* ─── Chat Area ─── */
.chat-area{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-messages{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:20px}
.chat-messages::-webkit-scrollbar{width:5px}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Welcome */
.welcome{flex:1;display:flex;align-items:center;justify-content:center}
.welcome-inner{text-align:center;max-width:480px;padding:32px}
.welcome-icon{font-size:64px;margin-bottom:16px}
.welcome h2{font-size:22px;font-weight:700;margin-bottom:8px}
.welcome p{color:var(--text-sec);font-size:14px;line-height:1.7}
.welcome-tips{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
.tip-card{padding:14px;border:1px solid var(--border);border-radius:10px;text-align:left;font-size:12px;color:var(--text-sec);cursor:pointer;transition:all .2s}
.tip-card:hover{border-color:var(--primary);background:var(--primary-dim)}
.tip-card .tip-icon{font-size:20px;margin-bottom:6px}

/* Messages */
.msg{max-width:780px;width:100%}
.msg.user{align-self:flex-end}
.msg.assistant{align-self:flex-start}
.msg-bubble{padding:14px 18px;border-radius:14px;font-size:14px;line-height:1.7;word-break:break-word}
.msg.user .msg-bubble{background:var(--primary);color:#fff;border-bottom-right-radius:4px}
.msg.assistant .msg-bubble{background:var(--card);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.assistant .msg-bubble p{margin-bottom:8px}
.msg.assistant .msg-bubble p:last-child{margin-bottom:0}
.msg.assistant .msg-bubble code{background:rgba(59,130,246,.15);padding:2px 6px;border-radius:4px;font-size:13px}
.msg.assistant .msg-bubble pre{background:var(--bg);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
.msg.assistant .msg-bubble pre code{background:none;padding:0}

/* Sources */
.sources{margin-top:10px}
.sources-toggle{font-size:12px;color:var(--primary);cursor:pointer;display:inline-flex;align-items:center;gap:4px;font-weight:600;transition:opacity .2s}
.sources-toggle:hover{opacity:.8}
.sources-list{margin-top:8px;display:none;gap:8px;flex-direction:column}
.sources-list.open{display:flex}
.source-card{padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);font-size:12px;transition:border-color .2s}
.source-card:hover{border-color:var(--primary)}
.source-card .sc-header{display:flex;justify-content:space-between;margin-bottom:6px;color:var(--text-sec)}
.source-card .sc-file{font-weight:600;color:var(--text)}
.source-card .sc-score{color:var(--primary);font-weight:600}
.source-card .sc-text{color:var(--text-sec);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.source-card.expanded .sc-text{-webkit-line-clamp:unset}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:8px 0}
.typing span{width:8px;height:8px;background:var(--text-dim);border-radius:50%;animation:bounce .6s infinite alternate}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{to{opacity:.3;transform:translateY(-4px)}}

/* ─── Input Bar ─── */
.input-bar{padding:16px 24px;border-top:1px solid var(--border);background:rgba(15,23,42,.9);backdrop-filter:blur(8px);flex-shrink:0}
.input-bar-inner{max-width:780px;margin:0 auto;display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1;position:relative}
.input-wrap textarea{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;transition:border-color .2s;min-height:46px;max-height:160px;line-height:1.5}
.input-wrap textarea:focus{border-color:var(--primary)}
.input-wrap textarea::placeholder{color:var(--text-dim)}
.send-btn{width:46px;height:46px;border:none;border-radius:12px;background:var(--primary);color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.send-btn:hover:not(:disabled){background:var(--primary-hover);transform:translateY(-1px)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.input-settings{display:flex;gap:12px;margin-top:8px;align-items:center}
.input-settings label{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:4px}
.input-settings select,.input-settings input[type="number"]{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:4px 8px;font-size:11px;outline:none}
.input-settings input[type="range"]{-webkit-appearance:none;height:4px;border-radius:2px;background:var(--border);outline:none;width:80px}
.input-settings input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--primary);cursor:pointer}

/* ─── Toast ─── */
.toast-container{position:fixed;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;animation:slideIn .3s ease;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.4);max-width:380px}
.toast.success{background:#065f46;color:#6ee7b7;border:1px solid #10b981}
.toast.error{background:#7f1d1d;color:#fca5a5;border:1px solid #ef4444}
.toast.info{background:#1e3a5f;color:#93c5fd;border:1px solid #3b82f6}
@keyframes slideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ─── Responsive ─── */
@media(max-width:768px){
  :root{--sidebar-w:280px}
  .sidebar{position:absolute;top:0;left:0;height:100%;z-index:40;box-shadow:8px 0 24px rgba(0,0,0,.3)}
  .sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w))}
  .tagline{display:none}
  .welcome-tips{grid-template-columns:1fr}
}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="toast-container" id="toastContainer"></div>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <button class="sidebar-toggle" id="sidebarToggle" onclick="toggleSidebar()">☰</button>
    <span class="logo">📚 RAG 知识库</span>
    <span class="tagline">上传文档 · 智能问答 · 溯源引用</span>
  </div>
  <div class="status-badge">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">检测中...</span>
  </div>
</header>

<!-- App Body -->
<div class="app-body">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-section-title">📤 上传文档</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".pdf,.txt,.md,.docx" multiple>
        <div class="uz-icon">📄</div>
        <div class="uz-text">拖拽文件到此处<br>或 <strong>点击选择</strong></div>
        <div class="uz-hint">支持 PDF / TXT / MD / DOCX</div>
      </div>
      <div class="upload-progress" id="uploadProgress">
        <div class="up-bar-wrap"><div class="up-bar" id="uploadBar"></div></div>
        <div class="up-label" id="uploadLabel">上传中...</div>
      </div>
    </div>
    <div class="sidebar-section" style="padding-top:0;flex-shrink:0">
      <div class="sidebar-section-title">📁 文档列表 <span id="docCount" style="font-weight:400;color:var(--text-dim)"></span></div>
    </div>
    <div class="doc-list" id="docList">
      <div class="doc-empty" id="docEmpty">暂无文档<br>上传后即可开始对话</div>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="chat-messages" id="chatMessages">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-inner">
          <div class="welcome-icon">🤖</div>
          <h2>RAG 智能知识库问答</h2>
          <p>上传你的文档（PDF、TXT、Markdown、DOCX），然后用自然语言提问。<br>AI 会从文档中检索相关内容并生成精准回答。</p>
          <div class="welcome-tips">
            <div class="tip-card" onclick="askQuestion('这份文档的主要内容是什么？')"><div class="tip-icon">📋</div>这份文档的主要内容是什么？</div>
            <div class="tip-card" onclick="askQuestion('帮我总结文档中的关键要点')"><div class="tip-icon">✨</div>帮我总结文档中的关键要点</div>
            <div class="tip-card" onclick="askQuestion('文档中提到了哪些重要概念？')"><div class="tip-icon">🔍</div>文档中提到了哪些重要概念？</div>
            <div class="tip-card" onclick="askQuestion('给我一个简短的执行摘要')"><div class="tip-icon">📊</div>给我一个简短的执行摘要</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="input-bar">
      <div class="input-bar-inner">
        <div class="input-wrap">
          <textarea id="chatInput" placeholder="基于你的文档提问..." rows="1" onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
      </div>
      <div class="input-settings">
        <label>检索数 <input type="number" id="topKInput" value="5" min="1" max="20" style="width:48px"></label>
        <label>温度 <input type="range" id="tempSlider" min="0" max="1" step="0.1" value="0.7" oninput="this.nextElementSibling.textContent=this.value"><span style="font-size:11px;color:var(--text-dim);min-width:22px">0.7</span></label>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ============== CONFIG ==============
var API_BASE = 'http://localhost:8000';
var MOCK_MODE = false;

// ============== STATE ==============
var documents = [];
var selectedDocIds = [];
var isWaiting = false;

// ============== MOCK ==============
var mockDocs = [
  { document_id: 'mock-1', filename: '产品需求文档.pdf', upload_time: new Date().toISOString(), total_chunks: 24, file_size: 245760 },
  { document_id: 'mock-2', filename: '技术架构设计.md', upload_time: new Date().toISOString(), total_chunks: 18, file_size: 51200 }
];

function mockUploadDoc(file) {
  return new Promise(function(r) {
    setTimeout(function() {
      var doc = { document_id: 'mock-' + Date.now(), filename: file.name, upload_time: new Date().toISOString(), total_chunks: Math.floor(Math.random() * 30) + 5, file_size: file.size };
      mockDocs.push(doc);
      r({ document_id: doc.document_id, filename: doc.filename, total_chunks: doc.total_chunks, processing_status: 'completed', status: 'success' });
    }, 1500);
  });
}

function mockChat(question) {
  return new Promise(function(r) {
    setTimeout(function() {
      r({
        answer: '根据您上传的文档，我找到了以下相关信息：\n\n**关键要点：**\n1. 文档中提到了多个重要概念和技术方案\n2. 建议重点关注第三章的架构设计部分\n3. 实施路径分为三个阶段推进\n\n> 这是一段来自文档的引用内容，展示了 RAG 系统的检索能力。\n\n如需了解更多细节，请继续提问。',
        sources: [
          { document_id: 'mock-1', filename: '产品需求文档.pdf', chunk_text: '本文档描述了产品的核心需求和技术架构。系统采用微服务架构，支持高并发访问和弹性扩展...', similarity_score: 0.92 },
          { document_id: 'mock-2', filename: '技术架构设计.md', chunk_text: 'RAG 系统的核心在于检索增强生成，通过向量相似度匹配找到最相关的文档片段...', similarity_score: 0.87 }
        ],
        question: question,
        status: 'success'
      });
    }, 2000);
  });
}

// ============== API ==============
async function apiHealth() {
  if (MOCK_MODE) return { status: 'healthy' };
  var res = await fetch(API_BASE + '/health');
  return await res.json();
}

async function apiUploadDoc(file) {
  if (MOCK_MODE) return mockUploadDoc(file);
  var fd = new FormData();
  fd.append('file', file);
  fd.append('chunk_size', '1000');
  fd.append('overlap', '200');
  var res = await fetch(API_BASE + '/api/upload-document', { method: 'POST', body: fd });
  if (!res.ok) throw new Error('上传失败: ' + res.status);
  return await res.json();
}

async function apiDocuments() {
  if (MOCK_MODE) return { documents: mockDocs, status: 'success' };
  var res = await fetch(API_BASE + '/api/documents');
  if (!res.ok) throw new Error('获取文档列表失败');
  return await res.json();
}

async function apiDeleteDoc(id) {
  if (MOCK_MODE) { mockDocs = mockDocs.filter(function(d) { return d.document_id !== id; }); return { status: 'success' }; }
  var res = await fetch(API_BASE + '/api/documents/' + id, { method: 'DELETE' });
  if (!res.ok) throw new Error('删除失败');
  return await res.json();
}

async function apiChat(question, docIds, topK, temperature) {
  if (MOCK_MODE) return mockChat(question);
  var res = await fetch(API_BASE + '/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ question: question, document_ids: docIds || [], top_k: topK || 5, temperature: temperature || 0.7 })
  });
  if (!res.ok) throw new Error('问答请求失败: ' + res.status);
  return await res.json();
}

// ============== TOAST ==============
function showToast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toastContainer');
  var t = document.createElement('div');
  t.className = 'toast ' + type;
  var icons = { success: '✅', error: '❌', info: 'ℹ️' };
  t.innerHTML = '<span>' + (icons[type] || '') + '</span><span>' + msg + '</span>';
  c.appendChild(t);
  setTimeout(function() { t.style.opacity = '0'; t.style.transform = 'translateX(40px)'; setTimeout(function() { t.remove(); }, 300); }, 3500);
}

// ============== HEALTH CHECK ==============
async function checkHealth() {
  var dot = document.getElementById('statusDot');
  var txt = document.getElementById('statusText');
  try {
    var d = await apiHealth();
    dot.className = 'status-dot ' + (d.status === 'healthy' ? 'online' : 'offline');
    txt.textContent = d.status === 'healthy' ? (MOCK_MODE ? 'Mock 模式' : 'API 在线') : 'API 异常';
  } catch(e) {
    dot.className = 'status-dot offline';
    txt.textContent = 'API 离线';
  }
}

// ============== SIDEBAR ==============
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('collapsed');
}

// ============== UPLOAD ==============
function setupUpload() {
  var zone = document.getElementById('uploadZone');
  var input = document.getElementById('fileInput');
  zone.addEventListener('click', function() { input.click(); });
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', function() { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.classList.remove('drag-over');
    if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
  });
  input.addEventListener('change', function() { if (input.files.length) { handleFiles(input.files); input.value = ''; } });
}

async function handleFiles(files) {
  var prog = document.getElementById('uploadProgress');
  var bar = document.getElementById('uploadBar');
  var label = document.getElementById('uploadLabel');
  prog.style.display = 'block';

  for (var i = 0; i < files.length; i++) {
    var file = files[i];
    var valid = /\.(pdf|txt|md|docx)$/i.test(file.name);
    if (!valid) { showToast(file.name + ' 格式不支持', 'error'); continue; }

    label.textContent = '正在上传 ' + file.name + '...';
    bar.style.width = '30%';

    try {
      bar.style.width = '60%';
      label.textContent = '解析分块中...';
      var res = await apiUploadDoc(file);
      bar.style.width = '100%';
      label.textContent = '✅ ' + file.name + ' — ' + res.total_chunks + ' 个分块';
      showToast(file.name + ' 上传成功，' + res.total_chunks + ' 个分块', 'success');
    } catch(e) {
      showToast('上传失败: ' + e.message, 'error');
    }
  }

  setTimeout(function() { prog.style.display = 'none'; bar.style.width = '0'; }, 2000);
  loadDocuments();
}

// ============== DOC LIST ==============
async function loadDocuments() {
  try {
    var data = await apiDocuments();
    documents = data.documents || [];
    renderDocList();
  } catch(e) {
    showToast('获取文档失败', 'error');
  }
}

function renderDocList() {
  var list = document.getElementById('docList');
  var empty = document.getElementById('docEmpty');
  var count = document.getElementById('docCount');
  count.textContent = documents.length ? '(' + documents.length + ')' : '';

  if (!documents.length) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = '';
    return;
  }
  if (empty.parentNode === list) list.removeChild(empty);

  list.innerHTML = documents.map(function(d) {
    var sel = selectedDocIds.indexOf(d.document_id) !== -1;
    var size = d.file_size < 1024 ? d.file_size + ' B' : d.file_size < 1048576 ? (d.file_size / 1024).toFixed(1) + ' KB' : (d.file_size / 1048576).toFixed(1) + ' MB';
    var ext = d.filename.split('.').pop().toUpperCase();
    var icons = { PDF: '📕', TXT: '📄', MD: '📝', DOCX: '📘' };
    return '<div class="doc-item' + (sel ? ' selected' : '') + '" data-id="' + d.document_id + '" onclick="toggleDocSelect(\'' + d.document_id + '\')">'
      + '<div class="doc-name">' + (icons[ext] || '📄') + ' ' + d.filename + '</div>'
      + '<div class="doc-meta"><span>' + d.total_chunks + ' 分块</span><span>' + size + '</span></div>'
      + '<button class="doc-delete" onclick="event.stopPropagation();deleteDoc(\'' + d.document_id + '\',\'' + d.filename.replace(/'/g, "\\'") + '\')" title="删除">🗑</button>'
      + '</div>';
  }).join('');
}

function toggleDocSelect(id) {
  var idx = selectedDocIds.indexOf(id);
  if (idx === -1) selectedDocIds.push(id); else selectedDocIds.splice(idx, 1);
  renderDocList();
}

async function deleteDoc(id, name) {
  if (!confirm('确认删除「' + name + '」？')) return;
  try {
    await apiDeleteDoc(id);
    selectedDocIds = selectedDocIds.filter(function(x) { return x !== id; });
    showToast(name + ' 已删除', 'success');
    loadDocuments();
  } catch(e) {
    showToast('删除失败: ' + e.message, 'error');
  }
}

// ============== CHAT ==============
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  document.getElementById('sendBtn').disabled = !el.value.trim() || isWaiting;
}

function handleInputKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function askQuestion(q) {
  document.getElementById('chatInput').value = q;
  autoResize(document.getElementById('chatInput'));
  sendMessage();
}

function hideWelcome() {
  var w = document.getElementById('welcomeScreen');
  if (w) w.style.display = 'none';
}

function appendMessage(role, content) {
  hideWelcome();
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg ' + role;

  var bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (role === 'assistant' && typeof marked !== 'undefined') {
    bubble.innerHTML = marked.parse(content);
  } else {
    bubble.textContent = content;
  }
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function appendSources(msgDiv, sources) {
  if (!sources || !sources.length) return;
  var wrap = document.createElement('div');
  wrap.className = 'sources';
  var toggle = document.createElement('div');
  toggle.className = 'sources-toggle';
  toggle.innerHTML = '📎 ' + sources.length + ' 个参考来源 ▾';
  var list = document.createElement('div');
  list.className = 'sources-list';

  toggle.addEventListener('click', function() {
    list.classList.toggle('open');
    toggle.innerHTML = list.classList.contains('open')
      ? '📎 ' + sources.length + ' 个参考来源 ▴'
      : '📎 ' + sources.length + ' 个参考来源 ▾';
  });

  sources.forEach(function(s) {
    var card = document.createElement('div');
    card.className = 'source-card';
    card.innerHTML = '<div class="sc-header"><span class="sc-file">📄 ' + s.filename + '</span><span class="sc-score">相似度 ' + (s.similarity_score * 100).toFixed(0) + '%</span></div><div class="sc-text">' + escapeHtml(s.chunk_text) + '</div>';
    card.addEventListener('click', function() { card.classList.toggle('expanded'); });
    list.appendChild(card);
  });

  wrap.appendChild(toggle);
  wrap.appendChild(list);
  msgDiv.appendChild(wrap);
}

function showTyping() {
  hideWelcome();
  var container = document.getElementById('chatMessages');
  var div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  var t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

function escapeHtml(str) {
  var d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function sendMessage() {
  var input = document.getElementById('chatInput');
  var question = input.value.trim();
  if (!question || isWaiting) return;

  isWaiting = true;
  input.value = '';
  autoResize(input);
  document.getElementById('sendBtn').disabled = true;

  appendMessage('user', question);
  showTyping();

  var topK = parseInt(document.getElementById('topKInput').value) || 5;
  var temp = parseFloat(document.getElementById('tempSlider').value) || 0.7;

  try {
    var data = await apiChat(question, selectedDocIds, topK, temp);
    removeTyping();
    var msgDiv = appendMessage('assistant', data.answer);
    appendSources(msgDiv, data.sources);
  } catch(e) {
    removeTyping();
    appendMessage('assistant', '❌ 出错了：' + e.message);
    showToast('问答失败: ' + e.message, 'error');
  } finally {
    isWaiting = false;
    document.getElementById('sendBtn').disabled = !input.value.trim();
  }
}

// ============== INIT ==============
document.addEventListener('DOMContentLoaded', async function() {
  // Auto-detect API
  try {
    var res = await fetch(API_BASE + '/health', { signal: AbortSignal.timeout(2000) });
    var data = await res.json();
    MOCK_MODE = !(data && data.status === 'healthy');
  } catch(e) {
    MOCK_MODE = true;
  }

  checkHealth();
  setInterval(checkHealth, 30000);
  setupUpload();
  loadDocuments();

  // Mobile: start with sidebar collapsed
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('collapsed');
  }
});
</script>
